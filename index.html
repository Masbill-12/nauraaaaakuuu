<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For nauraaaaa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Playfair+Display:italic,wght@400;700&family=Birthstone&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --gold: #dfc28d; --bg: #080808; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sign { font-family: 'Birthstone', cursive; }

        #canvas-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        #progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--gold); width: 0%; transition: 0.5s; z-index: 100; box-shadow: 0 0 10px var(--gold); }

        .section { display: none; opacity: 0; transition: 1s ease; }
        .active { display: flex; opacity: 1; }

        .msg-node {
            position: relative; padding: 1.8rem; margin-bottom: 5rem;
            background: rgba(255,255,255,0.03); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.06);
            transform: translateY(30px); opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 92%; line-height: 1.6; font-weight: 300;
        }
        .msg-node.visible { transform: translateY(0); opacity: 1; }
        .msg-node.blur { filter: blur(2px); opacity: 0.15; transform: scale(0.95); }

        .typing { font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; opacity: 0.7; display: flex; align-items: center; gap: 6px; padding-left: 10px; }
        .dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: blink 1.4s infinite; }

        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .btn-main {
            padding: 14px 35px; border: 1px solid var(--gold); color: var(--gold);
            background: transparent; font-size: 11px; letter-spacing: 4px;
            text-transform: uppercase; transition: 0.4s;
        }
        .btn-main:hover { background: var(--gold); color: #000; }

        .haptic-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 200; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .haptic-card { background: #151515; padding: 25px; border-radius: 24px; text-align: center; border: 1px solid rgba(223, 194, 141, 0.3); transform: scale(0.9); transition: 0.3s; }
        .haptic-overlay.active { display: flex; opacity: 1; }
        .haptic-overlay.active .haptic-card { transform: scale(1); }
        
        #s3 { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>

    <div id="progress"></div>
    <canvas id="canvas-bg"></canvas>
    <audio id="song" loop preload="auto"><source src="tunggal.mp3" type="audio/mpeg"></audio>

    <div id="haptic-menu" class="haptic-overlay" onclick="closeHaptic()">
        <div class="haptic-card" onclick="event.stopPropagation()">
            <p class="font-serif italic text-gold mb-5">Nauraaaaaa's Moment</p>
            <div class="flex gap-4 justify-center">
                <button onclick="closeHaptic()" class="px-5 py-2 bg-white/5 rounded-full text-[10px] uppercase tracking-widest">Love ❤️</button>
                <button onclick="closeHaptic()" class="px-5 py-2 bg-white/5 rounded-full text-[10px] uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <!-- STAGE 1 -->
    <section id="s1" class="section active h-screen flex-col items-center justify-center">
        <h1 class="text-6xl font-serif italic tracking-[12px] mb-12">Secret.</h1>
        <button onclick="start()" class="btn-main">Mulai Cerita</button>
    </section>

    <!-- STAGE 2 -->
    <section id="s2" class="section h-screen flex-col items-center justify-center p-6">
        <p class="text-[9px] tracking-[5px] text-gold/50 uppercase mb-10">Kumpulkan Cahaya Hati</p>
        <canvas id="gameCanvas" class="bg-white/5 rounded-[40px]"></canvas>
        <div class="mt-10 font-serif text-3xl tracking-[12px] text-gold"><span id="score">0</span>/8</div>
    </section>

    <!-- STAGE 3 -->
    <section id="s3" class="section h-screen flex-col pt-[15vh] px-7 overflow-y-auto">
        <div class="max-w-md mx-auto w-full pb-60">
            <div class="mb-24 opacity-60">
                <h2 class="text-4xl font-serif italic">Only For nauraaaaa,</h2>
                <div class="w-8 h-px bg-gold mt-3"></div>
            </div>
            
            <div id="msg-box"></div>

            <div id="final" class="hidden text-center mt-24">
                <p class="font-sign text-7xl text-gold mb-6">You're My Favorite Person</p>
                <button onclick="location.reload()" class="text-[8px] tracking-[4px] uppercase opacity-30 mt-12 hover:opacity-100 transition-opacity">Mulai Dari Awal</button>
            </div>
        </div>
    </section>

    <script>
        const song = document.getElementById('song');
        let letterIsRunning = false;

        // BG Animation
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(35).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*1.5, s: Math.random()*0.015, a: Math.random()*Math.PI*2
            }));
        }
        function drawBg() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.a += p.s;
                ctx.beginPath();
                ctx.arc(p.x + Math.cos(p.a)*15, p.y + Math.sin(p.a)*15, p.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(223, 194, 141, ${0.1 + Math.abs(Math.sin(p.a))*0.25})`;
                ctx.fill();
            });
            requestAnimationFrame(drawBg);
        }
        window.addEventListener('resize', initBg); initBg(); drawBg();

        function start() {
            song.play().catch(() => {});
            transition('s1', 's2');
            initGame();
        }

        function transition(from, to) {
            const f = document.getElementById(from);
            const t = document.getElementById(to);
            f.classList.remove('active');
            setTimeout(() => {
                f.style.display = 'none';
                t.style.display = (to === 's3') ? 'block' : 'flex';
                setTimeout(() => t.classList.add('active'), 50);
                if(to === 's3' && !letterIsRunning) playLetter();
            }, 800);
        }

        function initGame() {
            const gC = document.getElementById('gameCanvas');
            const gCtx = gC.getContext('2d');
            gC.width = 280; gC.height = 350;
            let score = 0;
            let lights = Array(8).fill().map(() => ({ x: Math.random()*240+20, y: Math.random()*310+20, hit: false }));

            gC.onclick = (e) => {
                const r = gC.getBoundingClientRect();
                const x = e.clientX - r.left; const y = e.clientY - r.top;
                lights.forEach(l => {
                    if(!l.hit && Math.hypot(x-l.x, y-l.y) < 35) {
                        l.hit = true; score++;
                        document.getElementById('score').innerText = score;
                        confetti({ particleCount: 15, colors:['#dfc28d'], origin: {x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight} });
                        if(navigator.vibrate) navigator.vibrate(10);
                    }
                });
                if(score === 8) setTimeout(() => transition('s2', 's3'), 600);
            };

            function draw() {
                if(score === 8) return;
                gCtx.fillStyle = 'rgba(8,8,8,0.2)'; gCtx.fillRect(0,0,280,350);
                lights.forEach(l => {
                    if(!l.hit) {
                        gCtx.beginPath(); gCtx.arc(l.x, l.y, 4, 0, Math.PI*2);
                        gCtx.fillStyle = '#dfc28d'; gCtx.shadowBlur = 10; gCtx.shadowColor = '#dfc28d';
                        gCtx.fill();
                    }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // TEKS ASLI DISINKRONKAN
        const lines = [
            "haiiii makasii yaa uda ngebukaa inii dan mainin minigamesss tadii",
            "sebenernya aku bingung harus mulaii darii manaa rasanee banyakk kataa yangg mauu akuu ketikk, tapii akuu sederhanainn ajaa yaa",
            "selamatt birthdayyy nauraaaaa, makasii yaa udaa lahirr diduniaa iniii makasii jugaa udaa nemeninn akuu, mengenalmuu adalahh hall yangg sangatt aku syukuriii, aakuuuuu saayanggg bangett samaa kamuu nauraaaaaaaaaaaa",
            "diumurmuu yangg baruu inii semogaa semestaa selaluu menjaga senyummu. kamuu punyaa daya tarikk tersendiri buatt akuu, sertaa duniakuu jadii lebihh indahh sejak adaa kamuu, akuu sabaaarrr hehehee kitaaa untukk ketemuuuu",
            "semogaa setiapp langkahmu diringankan, setiap bebanmu dikuatkan, dan semoga mimpi yang kamu dimpan bisa terwujudd satu per satuu di waktu yang paling tepat",
            "jangan pernah ragu untuk jadi dirimu sendiri. kamu yang apa adanyaa dengan segala tawa dan ceritamuu sudah lebih dari cukup untuk orang yang menyayangimu (termasuk aku hehe)",
            "makasiii jugaa yaa udaa mauu nemeninnn harii hariikuu akhirr akhirr inii. akuu sangat menikmati segala obrolann kitaa, candaaa tawaa muu ituu lahh yang membuat akuu senangg, sertaa maainnn ituu yangg akann akuu rindukaann heheee dann masiii kebayangg terusss semogaa ajaa kedepannya kitaa akann teruss kayaa ginii",
            "maaff jugaa kaloo akuu belumm bisaa ngasii apaa apaa buatt kamuuu, akuu belumm bisaaaa ngasii sesuatuu yangg kamuu mauu, akuu sekarangg hanyaa bisaa ngasihh ucapann kayaa ginii, maaf jugaa kaloo belumm bisaa kayaa temenn temennmuuu yang ngasii sesuatu dihari spesialmu inii",
            "happyy birthdayy nauraaaaakuuu manisss, enjoyy yourr speciall dayy sayanggg"
        ];

        async function playLetter() {
            letterIsRunning = true;
            const box = document.getElementById('msg-box');
            const prog = document.getElementById('progress');

            for(let i=0; i<lines.length; i++) {
                const old = box.querySelectorAll('.msg-node');
                if(old.length > 0) old[old.length-1].classList.add('blur');

                // 1. Tampilkan indikator mengetik
                const typeWrap = document.createElement('div');
                typeWrap.className = 'typing';
                typeWrap.innerHTML = `Sabil mengetik <div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div>`;
                box.appendChild(typeWrap);
                typeWrap.scrollIntoView({ behavior: 'smooth', block: 'end' });

                // Jeda ngetik disesuaikan dengan panjang teks yang akan muncul (biar logis)
                let typingSpeed = 1500 + (lines[i].length * 10); 
                await new Promise(r => setTimeout(r, Math.min(typingSpeed, 4000)));
                
                typeWrap.remove();

                // 2. Munculkan pesan
                const el = document.createElement('div');
                el.className = 'msg-node';
                el.innerText = lines[i];
                box.appendChild(el);

                const mc = new Hammer(el);
                mc.get('press').set({ time: 500 });
                mc.on('press', () => {
                    if(navigator.vibrate) navigator.vibrate(25);
                    document.getElementById('haptic-menu').classList.add('active');
                });

                setTimeout(() => el.classList.add('visible'), 50);
                
                setTimeout(() => {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
                
                prog.style.width = `${((i+1)/lines.length)*100}%`;
                
                // 3. DYNAMIC TIMING (Kunci Perbaikan)
                // Kita kasih waktu baca 100ms per karakter + 2 detik flat.
                // Minimal 4 detik, maksimal 10 detik per slide pesan.
                let readingTime = 2000 + (lines[i].length * 60); 
                let finalWait = Math.max(4000, Math.min(readingTime, 10000));
                
                await new Promise(r => setTimeout(r, finalWait));
            }
            
            document.getElementById('final').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('final').scrollIntoView({ behavior: 'smooth' });
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
            }, 500);
        }

        function closeHaptic() {
            document.getElementById('haptic-menu').classList.remove('active');
        }
    </script>
</body>
</html>
